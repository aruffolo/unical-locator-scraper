name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  quality-gates:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run Tests
        run: pytest -q

      - name: Validate Datasets
        run: python -m unical_scraper validate --data-dir data/normalized --schemas-dir data/schema

      - name: Build Report
        run: |
          mkdir -p /tmp/unical-report
          python -m unical_scraper report --data-dir data/normalized --schemas-dir data/schema --out /tmp/unical-report/report.json

      - name: Coverage Guardrails
        run: |
          mkdir -p /tmp/unical-report
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch --no-tags --depth=1 origin "${{ github.base_ref }}"
            git show "origin/${{ github.base_ref }}:data/normalized/report.json" > /tmp/unical-report/baseline-report.json
          elif git rev-parse --verify HEAD^ >/dev/null 2>&1; then
            git show HEAD^:data/normalized/report.json > /tmp/unical-report/baseline-report.json
          else
            cp data/normalized/report.json /tmp/unical-report/baseline-report.json
          fi

          python -m unical_scraper.validate.coverage_gate \
            --baseline /tmp/unical-report/baseline-report.json \
            --candidate /tmp/unical-report/report.json

      - name: Verify Dataset Contract
        run: |
          mkdir -p /tmp/unical-report
          python -m unical_scraper contract --data-dir data/normalized --out /tmp/unical-report/dataset_contract.generated.json
          diff -u data/normalized/dataset_contract.json /tmp/unical-report/dataset_contract.generated.json
