name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  quality-gates:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run Tests
        run: pytest -q

      - name: Validate Datasets
        run: python -m unical_scraper validate --data-dir data/normalized --schemas-dir data/schema

      - name: Build Report
        run: |
          mkdir -p /tmp/unical-report
          python -m unical_scraper report --data-dir data/normalized --schemas-dir data/schema --out /tmp/unical-report/report.json
